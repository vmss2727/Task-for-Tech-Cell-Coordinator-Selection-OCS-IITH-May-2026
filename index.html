<!DOCTYPE html>
<html lang="en">
<head>

  <title>OCS IITH – Room Booking</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>


  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e40a0a 0%, #FFA500 50%, #ffffff 100%);
      display: flex;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }
    .ocs-logo {
      width: 70px; height: 70px;
      background: #000000;
      border-radius: 50%; 
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px; color: white; font-weight: 900;
    }
    .btn-login {
      background: linear-gradient(135deg, #FFA500, #e40a0a);
      border: none; color: white;
      padding: 12px; font-size: 16px;
      border-radius: 10px;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .85; color: white; }
    .form-control:focus { border-color: #1a3a5c; box-shadow: 0 0 0 3px rgba(26,58,92,.2); }
  </style>
</head>


<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4 col-sm-10">
        <div class="card login-card p-4">
          <div class="card-body">
            <div class="text-center mb-4">
              <img src="logo.jpeg" class="ocs-logo" alt="OCS Logo">
              <h4 class="fw-bold text-dark mb-1">OCS IITH</h4>
              <p class="text-muted small">Room Booking System</p>
            </div>

            <div id="error-alert" class="alert alert-danger py-2 d-none small"></div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" id="email" class="form-control" placeholder="Enter your Email id"/>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" id="password" class="form-control" placeholder="Enter your password"/>
            </div>

            <button class="btn btn-login w-100" id="login-btn" onclick="login()">Sign In</button>

            <p class="text-center text-muted mt-4 small mb-0">
              Access is by admin invite only
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>



  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>


  <script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function redirectByRole(userId) {
      try {
        const { data, error } = await db.from('profiles').select('role, is_active').eq('id', userId).maybeSingle();

        console.log("PROFILE:", data);
        console.log("ERROR:", error);

        if (error) {
          alert(error.message);
          return;
        }

        if (!data) {
          alert("Profile not found");
          return;
        }

        if (!data.is_active) {
          alert("Account deactivated");
          return;
        }

        alert("Login successful");

        if (data.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'dashboard.html';
        }

      } catch (e) {
        console.error(e);
        alert(e.message);
      }
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      if (!email || !password) return showError('Please enter email and password.');

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        showError('Invalid email or password.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      await redirectByRole(data.user.id);
    }

    function showError(msg) {
      const el = document.getElementById('error-alert');
      el.textContent = msg;
      el.classList.remove('d-none');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
